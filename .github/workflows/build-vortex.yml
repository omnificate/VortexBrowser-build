name: Build Vortex Browser TIPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Firefox iOS
        uses: actions/checkout@v4
        with:
          repository: mozilla-mobile/firefox-ios
          path: firefox-ios
          depth: 1

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Rebrand to Vortex
        run: |
          cd firefox-ios
          # Update display name
          find . -name "Info.plist" -exec sed -i '' 's/Firefox/Vortex/g' {} \;
          find . -name "project.pbxproj" -exec sed -i '' 's/Firefox/Vortex/g' {} \;
          # Change bundle identifier
          find . -name "project.pbxproj" -exec sed -i '' 's/org.mozilla.ios.Firefox/com.vortex.browser/g' {} \;
          # Update marketing name
          sed -i '' 's/MARKETING_VERSION = .*/MARKETING_VERSION = 1.0.0;/g' firefox-ios/Client.xcodeproj/project.pbxproj || true

      - name: Install Dependencies
        run: |
          cd firefox-ios
          brew install swiftlint
          # Resolve packages
          xcodebuild -resolvePackageDependencies -project Client.xcodeproj -scheme Firefox

      - name: Build Archive
        run: |
          cd firefox-ios
          xcodebuild archive \
            -project Client.xcodeproj \
            -scheme Firefox \
            -destination "generic/platform=iOS" \
            -archivePath ../build/Vortex.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log

      - name: Install ldid
        run: brew install ldid

      - name: Create Payload and Fake Sign
        run: |
          mkdir -p build/Payload
          cp -R build/Vortex.xcarchive/Products/Applications/Client.app build/Payload/VortexBrowser.app

          # Create Info.plist modifications for TrollStore
          plutil -replace CFBundleIdentifier -string "com.vortex.browser" build/Payload/VortexBrowser.app/Info.plist
          plutil -replace CFBundleDisplayName -string "Vortex" build/Payload/VortexBrowser.app/Info.plist
          plutil -replace CFBundleName -string "VortexBrowser" build/Payload/VortexBrowser.app/Info.plist

          # Create PkgInfo
          echo -n "APPLvBrs" > build/Payload/VortexBrowser.app/PkgInfo

          # Fake sign the binary with ldid
          ldid -S build/Payload/VortexBrowser.app/VortexBrowser || ldid -Sentitlements.xml build/Payload/VortexBrowser.app/VortexBrowser || true

          # Create CodeSignature directory
          mkdir -p build/Payload/VortexBrowser.app/_CodeSignature
          touch build/Payload/VortexBrowser.app/embedded.mobileprovision

      - name: Package TIPA
        run: |
          cd build
          zip -r9 VortexBrowser.tipa Payload/
          ls -lh VortexBrowser.tipa
          echo "=== TIPA contents ==="
          unzip -l VortexBrowser.tipa | head -20

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-tipa
          path: build/VortexBrowser.tipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} build/VortexBrowser.tipa \
            --title "Vortex Browser ${{ github.ref_name }}" \
            --notes "Real browser based on Firefox iOS with performance optimizations. Install with TrollStore."
