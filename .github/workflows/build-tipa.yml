name: Build VortexBrowser TIPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install dependencies
        run: |
          brew install ldid dpkg

      - name: Build VortexBrowser
        run: |
          # Create build directories
          mkdir -p build/Payload/VortexBrowser.app

          # Compile sources
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

          # Compile C++ sources with optimizations
          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -O3 -ffast-math -fobjc-arc \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/Engine.cpp -o build/Engine.o

          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/Layout.cpp -o build/Layout.o

          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/CSS.cpp -o build/CSS.o

          # Compile Objective-C++
          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -O3 -fobjc-arc -fmodules \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/VortexBrowserApp.mm -o build/VortexBrowserApp.o

          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -O3 -fobjc-arc -fmodules \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/Renderer.mm -o build/Renderer.o

          # Compile Metal shaders
          xcrun -sdk iphoneos metal -c shaders/VortexShaders.metal -o build/VortexShaders.air
          xcrun -sdk iphoneos metal-ar r build/VortexShaders.metalar build/VortexShaders.air
          xcrun -sdk iphoneos metallib build/VortexShaders.metalar -o build/VortexShaders.metallib

          # Link executable
          clang++ -arch arm64 -isysroot $SDK_PATH -mios-version-min=14.0 \
            -framework Foundation -framework UIKit -framework Metal -framework MetalKit \
            -framework QuartzCore -framework CoreGraphics -framework CoreText \
            -stdlib=libc++ -fobjc-arc -fobjc-link-runtime \
            build/Engine.o build/Layout.o build/CSS.o \
            build/VortexBrowserApp.o build/Renderer.o \
            -o build/Payload/VortexBrowser.app/VortexBrowser

          # Copy resources
          cp platform/iOS/Info.plist build/Payload/VortexBrowser.app/
          cp platform/iOS/VortexBrowser.entitlements build/Payload/VortexBrowser.app/
          cp build/VortexShaders.metallib build/Payload/VortexBrowser.app/

          # Create PkgInfo
          echo -n "APPLvBrs" > build/Payload/VortexBrowser.app/PkgInfo

      - name: Fake sign with ldid
        run: |
          # Use ldid for fake signing (TrollStore compatible)
          ldid -Splatform/iOS/VortexBrowser.entitlements \
            -K/dev/null \
            build/Payload/VortexBrowser.app/VortexBrowser

          # Create code signature structure
          mkdir -p build/Payload/VortexBrowser.app/_CodeSignature

          # Generate CodeResources
          cat > build/Payload/VortexBrowser.app/_CodeSignature/CodeResources << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>files</key>
              <dict/>
              <key>files2</key>
              <dict/>
              <key>rules</key>
              <dict>
                  <key>^.*</key>
                  <true/>
              </dict>
              <key>rules2</key>
              <dict>
                  <key>^.*</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF

          # Touch embedded.mobileprovision (empty for TrollStore)
          touch build/Payload/VortexBrowser.app/embedded.mobileprovision

      - name: Create IPA and TIPA
        run: |
          cd build

          # Create IPA
          zip -r VortexBrowser.ipa Payload/

          # Create TIPA (same content, different extension for TrollStore)
          cp VortexBrowser.ipa VortexBrowser.tipa

          # Verify structures
          echo "=== IPA Contents ==="
          unzip -l VortexBrowser.ipa | head -20

          echo "=== App Bundle ==="
          ls -la Payload/VortexBrowser.app/

          echo "=== File sizes ==="
          ls -lh VortexBrowser.ipa VortexBrowser.tipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-ipa
          path: build/VortexBrowser.ipa
          retention-days: 30

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-tipa
          path: build/VortexBrowser.tipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/VortexBrowser.ipa
            build/VortexBrowser.tipa
          body: |
            ## VortexBrowser ${{ github.ref_name }}

            ### Installation

            **TrollStore (iOS 14.0-16.6.1):**
            - Download `VortexBrowser.tipa`
            - AirDrop to iPhone or open in TrollStore
            - Permanent installation, no re-signing

            **AltStore/Sideloadly:**
            - Download `VortexBrowser.ipa`
            - Install with your preferred sideloading tool
            - Re-sign every 7 days (or use paid dev cert)

            ### Requirements
            - iOS 14.0+
            - iPhone XS/XR or newer (A12+)
            - Metal-capable GPU

      - name: Summary
        run: |
          echo "✅ Build complete!"
          echo "Download artifacts from:"
          echo "  - VortexBrowser.ipa (AltStore/Sideloadly)"
          echo "  - VortexBrowser.tipa (TrollStore)"
