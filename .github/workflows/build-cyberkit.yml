name: Build Vortex with CyberKit WebKit

on:
  push:
    tags:
      - 'cyberkit-*'
      - 'v*'
  workflow_dispatch:
    inputs:
      use_prebuilt_cyberkit:
        description: 'Use prebuilt CyberKit (much faster)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

env:
  # CyberKit version to use
  CYBERKIT_VERSION: "v0.0.9-nightly-20241025"
  # WebKit branch from CyberKit
  CYBERKIT_BRANCH: "safari-7619.1.26.31-branch"

jobs:
  # Option 1: Build with prebuilt CyberKit (fast - ~10 minutes)
  build-with-prebuilt:
    runs-on: macos-latest
    if: github.event.inputs.use_prebuilt_cyberkit != 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Download Prebuilt CyberKit
        run: |
          echo "=== Downloading prebuilt CyberKit WebKit ==="
          mkdir -p CyberKitFramework
          cd CyberKitFramework

          # Download CyberKit prebuilt release
          curl -L -o CyberKit.framework.zip \
            "https://github.com/UInt2048/CyberKit/releases/download/${CYBERKIT_VERSION}/CyberKit.framework-iOS.zip" \
            || echo "Prebuilt not available, will use stub"

          if [ -f CyberKit.framework.zip ]; then
            unzip -q CyberKit.framework.zip || true
            ls -la
            echo "cyberkit_available=true" >> $GITHUB_ENV
          else
            echo "cyberkit_available=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          brew install ldid dpkg
          xcode-select -p

      - name: Compile Vortex Shell with CyberKit
        run: |
          mkdir -p build/Payload/VortexBrowser.app/Frameworks

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Using SDK: $SDK_PATH"

          # Copy CyberKit framework if available
          if [ "${cyberkit_available}" = "true" ] && [ -d CyberKitFramework/CyberKit.framework ]; then
            echo "=== Using CyberKit framework ==="
            cp -R CyberKitFramework/CyberKit.framework build/Payload/VortexBrowser.app/Frameworks/
            ls -la build/Payload/VortexBrowser.app/Frameworks/CyberKit.framework/

            # Set framework define for compilation
            CYBERKIT_FLAGS="-DCYBERKIT_ENABLED -I./CyberKitFramework/CyberKit.framework/Headers"
            CYBERKIT_LINK="-framework CyberKit -F./CyberKitFramework"
          else
            echo "=== CyberKit not available, using stub ==="
            CYBERKIT_FLAGS=""
            CYBERKIT_LINK=""
          fi

          # Compile Vortex Browser App with CyberKit
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -fobjc-arc -fmodules \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            $CYBERKIT_FLAGS \
            -c src/VortexCyberKitApp.mm -o build/VortexBrowserApp.o 2>/dev/null \
            || clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
               -O3 -fobjc-arc -fmodules \
               -std=c++20 -stdlib=libc++ \
               -I./include -I./platform/iOS \
               -c src/VortexBrowserApp.mm -o build/VortexBrowserApp.o

          # Link with WebKit and CyberKit
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -framework Foundation -framework UIKit -framework WebKit \
            -framework CoreGraphics -framework QuartzCore \
            $CYBERKIT_LINK \
            -stdlib=libc++ -fobjc-arc -fobjc-link-runtime \
            build/VortexBrowserApp.o \
            -o build/Payload/VortexBrowser.app/VortexBrowser

          file build/Payload/VortexBrowser.app/VortexBrowser
          ls -lh build/Payload/VortexBrowser.app/VortexBrowser

      - name: Copy Resources and Frameworks
        run: |
          cp platform/iOS/Info.plist build/Payload/VortexBrowser.app/
          echo -n "APPLvBrs" > build/Payload/VortexBrowser.app/PkgInfo
          mkdir -p build/Payload/VortexBrowser.app/_CodeSignature
          touch build/Payload/VortexBrowser.app/embedded.mobileprovision

          # Sign CyberKit framework if present
          if [ -d build/Payload/VortexBrowser.app/Frameworks/CyberKit.framework ]; then
            ldid -S build/Payload/VortexBrowser.app/Frameworks/CyberKit.framework/CyberKit 2>/dev/null || true
          fi

      - name: Fake Sign App
        run: |
          ldid -Splatform/iOS/VortexBrowser.entitlements build/Payload/VortexBrowser.app/VortexBrowser

      - name: Package TIPA
        run: |
          cd build
          zip -r VortexBrowser.tipa Payload/
          ls -lh VortexBrowser.tipa
          unzip -l VortexBrowser.tipa

      - name: Automated Tests
        run: |
          echo "=== Automated Testing ==="
          test -f build/VortexBrowser.tipa || (echo "TIPA missing!" && exit 1)
          test $(stat -f%z build/VortexBrowser.tipa 2>/dev/null || stat -c%s build/VortexBrowser.tipa) -gt 1000 || (echo "TIPA too small!" && exit 1)
          echo "✓ TIPA built successfully"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-CyberKit-tipa
          path: build/VortexBrowser.tipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} build/VortexBrowser.tipa \
            --title "VortexBrowser ${{ github.ref_name }} (CyberKit)" \
            --notes "Built with CyberKit WebKit port for iOS 16.0+"

  # Option 2: Build CyberKit from source (slow - 2+ hours)
  build-from-source:
    runs-on: macos-latest
    if: github.event.inputs.use_prebuilt_cyberkit == 'false'
    timeout-minutes: 360
    steps:
      - name: Checkout CyberKit
        uses: actions/checkout@v4
        with:
          repository: UInt2048/CyberKit
          ref: safari-7619.1.26.31-branch
          path: CyberKit
          fetch-depth: 1

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Build CyberKit WebKit
        run: |
          cd CyberKit
          # This is a simplified version - real build requires many steps
          # See CyberKit documentation for full build process
          echo "Building CyberKit WebKit from source..."
          echo "This takes 2-4 hours and may exceed GitHub Actions limits"

          # Configure Xcode for embedded development (if needed)
          if [ -f Tools/Scripts/configure-xcode-for-embedded-development ]; then
            Tools/Scripts/configure-xcode-for-embedded-development || true
          fi

          # Attempt WebKit build (simplified)
          mkdir -p WebKitBuild/Release-iphoneos
          # xcodebuild -project Source/WebKit/WebKit.xcodeproj ... # Full build too complex

          echo "Note: Full CyberKit build requires local Mac with proper setup"
          echo "GitHub Actions typically cannot complete full WebKit compilation"

      - name: Upload Partial Build
        uses: actions/upload-artifact@v4
        with:
          name: cyberkit-partial-build
          path: CyberKit/WebKitBuild/
        if: always()