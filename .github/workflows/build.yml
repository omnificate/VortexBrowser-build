name: Build Vortex TIPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Build App Structure
        run: |
          mkdir -p build/Payload/VortexBrowser.app
          echo "VortexBrowser Placeholder" > build/Payload/VortexBrowser.app/VortexBrowser
          chmod +x build/Payload/VortexBrowser.app/VortexBrowser
          cp platform/iOS/Info.plist build/Payload/VortexBrowser.app/
          echo -n "APPLvBrs" > build/Payload/VortexBrowser.app/PkgInfo

      - name: Create CodeSignature
        run: |
          mkdir -p build/Payload/VortexBrowser.app/_CodeSignature
          touch build/Payload/VortexBrowser.app/embedded.mobileprovision

      - name: Fake Sign with ldid
        run: ldid -Splatform/iOS/VortexBrowser.entitlements build/Payload/VortexBrowser.app/VortexBrowser || true

      - name: Package TIPA
        run: |
          cd build
          zip -r VortexBrowser.tipa Payload/
          ls -lh VortexBrowser.tipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-tipa
          path: build/VortexBrowser.tipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} build/VortexBrowser.tipa \
            --title "VortexBrowser ${{ github.ref_name }}" \
            --notes "TIPA file for TrollStore installation" \
            || echo "Release may already exist"
