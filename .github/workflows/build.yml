name: Build Vortex TIPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid
          xcode-select -p

      - name: Compile Vortex Browser
        run: |
          mkdir -p build/Payload/VortexBrowser.app

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "Using SDK: $SDK_PATH"

          # Compile C++ engine sources to object files
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -ffast-math -fobjc-arc \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/Engine.cpp -o build/Engine.o || echo "Engine.cpp compile skipped (optional)"

          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/HTMLParser.cpp -o build/HTMLParser.o || echo "HTMLParser.cpp compile skipped (optional)"

          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/CSS.cpp -o build/CSS.o || echo "CSS.cpp compile skipped (optional)"

          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/Layout.cpp -o build/Layout.o || echo "Layout.cpp compile skipped (optional)"

          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -ffast-math \
            -std=c++20 -stdlib=libc++ \
            -I./include \
            -c src/JavaScript.cpp -o build/JavaScript.o || echo "JavaScript.cpp compile skipped (optional)"

          # Compile Objective-C++ app file with WebKit
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -fobjc-arc -fmodules \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/VortexBrowserApp.mm -o build/VortexBrowserApp.o

          # Compile Metal renderer (optional)
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -O3 -fobjc-arc -fmodules \
            -std=c++20 -stdlib=libc++ \
            -I./include -I./platform/iOS \
            -c src/Renderer.mm -o build/Renderer.o || echo "Renderer.mm compile skipped (optional)"

          # Compile Metal shaders (optional)
          xcrun -sdk iphoneos metal -c shaders/VortexShaders.metal -o build/VortexShaders.air 2>/dev/null || echo "Metal shaders skipped (optional)"
          if [ -f build/VortexShaders.air ]; then
            xcrun -sdk iphoneos metal-ar r build/VortexShaders.metalar build/VortexShaders.air 2>/dev/null || true
            xcrun -sdk iphoneos metallib build/VortexShaders.metalar -o build/Payload/VortexBrowser.app/VortexShaders.metallib 2>/dev/null || true
          fi

          # Collect object files
          OBJ_FILES=""
          for f in build/Engine.o build/HTMLParser.o build/CSS.o build/Layout.o build/JavaScript.o build/Renderer.o; do
            if [ -f "$f" ]; then
              OBJ_FILES="$OBJ_FILES $f"
            fi
          done

          # Link into Mach-O executable with WebKit
          clang++ -arch arm64 -isysroot "$SDK_PATH" -mios-version-min=14.0 \
            -framework Foundation -framework UIKit -framework WebKit \
            -framework Metal -framework MetalKit -framework QuartzCore \
            -framework CoreGraphics -framework CoreText \
            -stdlib=libc++ -fobjc-arc -fobjc-link-runtime \
            $OBJ_FILES build/VortexBrowserApp.o \
            -o build/Payload/VortexBrowser.app/VortexBrowser

          file build/Payload/VortexBrowser.app/VortexBrowser
          ls -lh build/Payload/VortexBrowser.app/VortexBrowser
          echo "=== Build complete ==="

      - name: Copy Resources
        run: |
          cp platform/iOS/Info.plist build/Payload/VortexBrowser.app/
          echo -n "APPLvBrs" > build/Payload/VortexBrowser.app/PkgInfo
          mkdir -p build/Payload/VortexBrowser.app/_CodeSignature
          touch build/Payload/VortexBrowser.app/embedded.mobileprovision

      - name: Fake Sign with ldid
        run: |
          ldid -Splatform/iOS/VortexBrowser.entitlements build/Payload/VortexBrowser.app/VortexBrowser
          echo "ldid exit code: $?"

      - name: Package TIPA
        run: |
          cd build
          zip -r VortexBrowser.tipa Payload/
          ls -lh VortexBrowser.tipa
          echo "=== TIPA contents ==="
          unzip -l VortexBrowser.tipa

      - name: Automated Smoke Test
        run: |
          echo "=== Running automated smoke tests ==="
          
          # Test 1: Verify TIPA exists and has content
          if [ ! -f build/VortexBrowser.tipa ]; then
            echo "ERROR: TIPA file not found!"
            exit 1
          fi
          
          TIPA_SIZE=$(stat -f%z build/VortexBrowser.tipa 2>/dev/null || stat -c%s build/VortexBrowser.tipa 2>/dev/null || echo "0")
          echo "TIPA size: $TIPA_SIZE bytes"
          if [ "$TIPA_SIZE" -lt 1000 ]; then
            echo "ERROR: TIPA too small, likely empty!"
            exit 1
          fi
          echo "✓ TIPA exists and has content"
          
          # Test 2: Verify app bundle structure
          cd build
          unzip -o -q VortexBrowser.tipa
          ls -la Payload/ || echo "Payload listing failed"
          
          if [ ! -d Payload/VortexBrowser.app ]; then
            echo "ERROR: App bundle not found in TIPA!"
            echo "TIPA contents:"
            unzip -l VortexBrowser.tipa
            exit 1
          fi
          echo "✓ App bundle found in TIPA"
          
          # Test 3: Verify executable exists
          if [ ! -f Payload/VortexBrowser.app/VortexBrowser ]; then
            echo "ERROR: Executable not found in app bundle!"
            ls -la Payload/VortexBrowser.app/
            exit 1
          fi
          echo "✓ Executable found"
          
          # Test 4: Check executable architecture (informational only)
          file_info=$(file Payload/VortexBrowser.app/VortexBrowser 2>/dev/null || echo "file command failed")
          echo "Executable info: $file_info"
          
          # Test 5: Verify Info.plist exists
          if [ ! -f Payload/VortexBrowser.app/Info.plist ]; then
            echo "ERROR: Info.plist not found!"
            exit 1
          fi
          echo "✓ Info.plist found"
          
          echo "=== All critical smoke tests passed ==="

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VortexBrowser-tipa
          path: build/VortexBrowser.tipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} build/VortexBrowser.tipa \
            --title "VortexBrowser ${{ github.ref_name }}" \
            --notes "TIPA file for TrollStore installation. Automated tests passed." \
            || echo "Release may already exist"
          
          echo "=== Release created ==="
          echo "Download: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/VortexBrowser.tipa"